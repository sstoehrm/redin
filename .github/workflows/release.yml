name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0). Leave empty for dev build."
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: recursive

      # Validate the workflow input before using it anywhere. Without this,
      # a maintainer typo like `v1.0.0; rm -rf /` flows verbatim into the
      # release name and tag (#136 L2). The trigger is workflow_dispatch
      # (maintainer-only) so this isn't a code-injection vector, but a
      # fail-fast regex keeps malformed inputs from reaching GitHub's
      # release API at all.
      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            # Strict semver-ish: optional leading `v`, MAJOR.MINOR.PATCH,
            # optional `-pre.release.tag`. No spaces, no shell metas.
            if ! printf '%s' "$INPUT_VERSION" \
                 | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
              echo "::error::version input '$INPUT_VERSION' does not match ^v?[0-9]+\\.[0-9]+\\.[0-9]+(-[A-Za-z0-9.]+)?\$" >&2
              exit 2
            fi
            echo "tag=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libssl-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxinerama-dev \
            xvfb

      - name: Install Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d  # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          luajit test/lua/runner.lua test/lua/test_*.fnl
          mkdir -p build
          ./build-dev.sh

      - name: Build release binary
        run: ./build-dev.sh -o:speed

      - name: AOT compile Fennel runtime
        run: |
          mkdir -p dist/runtime
          for f in src/runtime/*.fnl; do
            name=$(basename "$f" .fnl)
            luajit vendor/fennel/fennel.lua --compile "$f" > "dist/runtime/${name}.lua"
          done

      - name: Package release
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          cp build/redin dist/
          mkdir -p dist/lib/odin-http
          rsync -a --exclude=openssl/includes --exclude=docs --exclude=examples --exclude=comparisons --exclude=old_nbio lib/odin-http/ dist/lib/odin-http/
          mkdir -p dist/vendor/fennel
          cp vendor/fennel/fennel.lua dist/vendor/fennel/
          mkdir -p dist/vendor/luajit/lib
          cp vendor/luajit/lib/libluajit-5.1.a dist/vendor/luajit/lib/
          mkdir -p dist/docs/guide dist/docs/reference
          cp docs/core-api.md docs/app-api.md dist/docs/
          cp docs/guide/*.md dist/docs/guide/ 2>/dev/null || true
          cp docs/reference/*.md dist/docs/reference/ 2>/dev/null || true
          mkdir -p dist/skills/redin-dev
          cp .claude/skills/redin-dev/SKILL.md dist/skills/redin-dev/
          [ -f LICENSE ] && cp LICENSE dist/ || true
          tar czf "redin-${VERSION}-linux-amd64.tar.gz" -C dist .
          # SHA-256 checksum published alongside the tarball so downstream
          # tooling (redin-cli, manual `sha256sum -c`) can detect transport
          # corruption or a swap during transit. #136 L4. Full signing
          # (cosign keyless) is a follow-up; this is the minimum-friction
          # integrity check.
          sha256sum "redin-${VERSION}-linux-amd64.tar.gz" \
            > "redin-${VERSION}-linux-amd64.tar.gz.sha256"

      - name: Smoke check (native build from tarball)
        # Simulates redin-cli's upgrade-to-native against the freshly built
        # tarball and asserts the resulting native binary loads the Fennel
        # runtime. Blocks publish if the tarball is broken downstream.
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: bash scripts/smoke-native.sh "redin-${VERSION}-linux-amd64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: redin-${{ steps.version.outputs.tag }}-linux-amd64
          path: |
            redin-${{ steps.version.outputs.tag }}-linux-amd64.tar.gz
            redin-${{ steps.version.outputs.tag }}-linux-amd64.tar.gz.sha256

      - name: Build agent binary
        run: |
          rm -rf dist-agent
          mkdir -p dist-agent
          odin build src/cmd/redin -collection:lib=lib -collection:luajit=vendor/luajit \
            -define:REDIN_DEV=true -define:REDIN_PROFILE=true -define:REDIN_TRACK_MEM=true \
            -define:REDIN_AGENT=true -out:dist-agent/redin -o:speed

      - name: Package agent release
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          # Mirror dist/'s structure but swap in the agent binary.
          # Other files (runtime, lib, vendor, docs, skills, LICENSE) are
          # identical to the default build, so we copy them from dist/
          # rather than re-running the bundling steps.
          cp -r dist/runtime dist-agent/
          cp -r dist/lib dist-agent/
          cp -r dist/vendor dist-agent/
          cp -r dist/docs dist-agent/
          cp -r dist/skills dist-agent/
          [ -f dist/LICENSE ] && cp dist/LICENSE dist-agent/ || true
          tar czf "redin-${VERSION}-agent-linux-amd64.tar.gz" -C dist-agent .
          # SHA-256 checksum, same rationale as the default tarball (#136 L4).
          sha256sum "redin-${VERSION}-agent-linux-amd64.tar.gz" \
            > "redin-${VERSION}-agent-linux-amd64.tar.gz.sha256"

      - name: Upload agent artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: redin-${{ steps.version.outputs.tag }}-agent-linux-amd64
          path: |
            redin-${{ steps.version.outputs.tag }}-agent-linux-amd64.tar.gz
            redin-${{ steps.version.outputs.tag }}-agent-linux-amd64.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.version != ''
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ inputs.version }}
          name: redin ${{ inputs.version }}
          draft: false
          prerelease: ${{ !startsWith(inputs.version, 'v') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
          body: |
            ## What's included
            - `redin` binary (Linux x86_64, LuaJIT statically linked,
              built with REDIN_DEV / REDIN_PROFILE / REDIN_TRACK_MEM)
            - AOT-compiled Fennel runtime
            - Fennel compiler (for hot reload)
            - Developer documentation (guides + reference)
            - Claude Code skill for redin development

            ## Verifying the download

            Each `.tar.gz` ships with a matching `.tar.gz.sha256` file
            containing the SHA-256 of the tarball. After download:

            ```bash
            sha256sum -c redin-VERSION-linux-amd64.tar.gz.sha256
            ```

            ## Quick start
            ```
            redin-cli new-fnl my-app
            cd my-app && ./redinw main.fnl
            ```

            ## Breaking changes from prior releases

            The `--dev`, `--profile`, and `--track-mem` runtime CLI flags
            are removed. They become compile-time `-define`s
            (`REDIN_DEV`, `REDIN_PROFILE`, `REDIN_TRACK_MEM`). The
            shipped `redin` binary has all three baked in (its audience
            is AI workflow drivers that need the dev server); a bare
            `odin build` still produces a release-stripped variant.

            **Migrating an existing `--native` project:**

            ```diff
            # app.odin
              cfg: redin.Config
            - cfg.dev = true
            - cfg.profile = true
              cfg.app = "main.fnl"
              redin.run(cfg)

            # build.sh — add the three -define flags before -out:
              odin build "$SCRIPT_DIR" \
                -collection:lib="$SCRIPT_DIR/.redin/lib" \
                -collection:luajit="$SCRIPT_DIR/.redin/vendor/luajit" \
            +   -define:REDIN_DEV=true \
            +   -define:REDIN_PROFILE=true \
            +   -define:REDIN_TRACK_MEM=true \
                -out:"$SCRIPT_DIR/build/redin"
            ```

            The F3 frame-timing overlay is now visible by default in any
            binary built with `REDIN_PROFILE=true`. Press F3 to hide it.
