name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libluajit-5.1-dev libssl-dev

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Fennel tests
        run: luajit test/lua/runner.lua test/lua/test_*.fnl

      - name: Run Odin tests
        run: odin test src/host/parser

      - name: Build host
        run: odin build src/host -out:build/redin
