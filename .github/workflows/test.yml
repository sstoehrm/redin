name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      # Assert the resolved odin-http submodule matches the reviewed pin.
      # `submodules: recursive` resolves the gitlink SHA, but nothing else
      # here fails if that pointer is moved — by a PR bumping the gitlink or a
      # history-rewrite at the pinned SHA — the same trust-without-assertion
      # gap the third-party-action SHA pins close. Bump `expected` to match the
      # gitlink whenever odin-http is intentionally rolled forward (#221 L1).
      - name: Verify odin-http submodule SHA
        run: |
          expected=9f50972ec8a7f4e31bd050f245b79f63733f31f8
          actual=$(git -C lib/odin-http rev-parse HEAD)
          [ "$actual" = "$expected" ] || {
            echo "::error::odin-http submodule SHA mismatch (got $actual, expected $expected)"
            exit 1
          }

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libssl-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxinerama-dev

      - name: Install Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d  # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pin the Odin release: the default tracks master, which broke
          # core:sys/linux (Sig_Action) between dev-2026-04 and -06 and
          # turned CI red repo-wide. dev-2026-04 is the line the tree
          # builds and tests clean on. Bump deliberately, not silently.
          release: dev-2026-04

      - name: Run Fennel tests
        run: luajit test/lua/runner.lua test/lua/test_*.fnl

      - name: Run Odin parser tests
        run: odin test src/redin/parser

      - name: Run Odin markdown tests
        run: odin test src/redin/markdown -collection:lib=lib -collection:luajit=vendor/luajit

      - name: Run Odin profile tests
        run: odin test src/redin/profile -collection:lib=lib -collection:luajit=vendor/luajit

      # ODIN_TEST_THREADS=1 works around the package-global `state` /
      # `override` race documented in #118. Once the fix (per-package
      # test mutex + idempotent destroy) lands, drop the flag here.
      - name: Run Odin input tests
        run: odin test src/redin/input -collection:lib=lib -collection:luajit=vendor/luajit -define:ODIN_TEST_THREADS=1

      - name: Run Odin bridge tests
        run: odin test src/redin/bridge -collection:lib=lib -collection:luajit=vendor/luajit

      - name: Run Odin canvas tests
        run: odin test src/redin/canvas -collection:lib=lib -collection:luajit=vendor/luajit

      - name: Build redin
        run: |
          mkdir -p build
          ./build-dev.sh

  test-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      # Assert the resolved odin-http submodule matches the reviewed pin.
      # `submodules: recursive` resolves the gitlink SHA, but nothing else
      # here fails if that pointer is moved — by a PR bumping the gitlink or a
      # history-rewrite at the pinned SHA — the same trust-without-assertion
      # gap the third-party-action SHA pins close. Bump `expected` to match the
      # gitlink whenever odin-http is intentionally rolled forward (#221 L1).
      - name: Verify odin-http submodule SHA
        run: |
          expected=9f50972ec8a7f4e31bd050f245b79f63733f31f8
          actual=$(git -C lib/odin-http rev-parse HEAD)
          [ "$actual" = "$expected" ] || {
            echo "::error::odin-http submodule SHA mismatch (got $actual, expected $expected)"
            exit 1
          }

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libssl-dev xvfb \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxinerama-dev

      # Pinned download + sha256 verification — never pipe `master/install`
      # into `sudo bash`. See issue #136 (H1). Bump BB_VERSION + BB_SHA256
      # together; the sha is for the linux-amd64-static tarball published
      # alongside the release.
      - name: Install Babashka
        env:
          BB_VERSION: 1.12.218
          BB_SHA256: 7bd028cc794732ffde3da31ce4379840893c8e54f1046f92a8dfc4f4b3cddaf8
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          curl -fsSL -o "$tmp/bb.tar.gz" \
            "https://github.com/babashka/babashka/releases/download/v${BB_VERSION}/babashka-${BB_VERSION}-linux-amd64-static.tar.gz"
          echo "${BB_SHA256}  $tmp/bb.tar.gz" | sha256sum -c -
          tar -xzf "$tmp/bb.tar.gz" -C "$tmp" bb
          sudo install -m 0755 "$tmp/bb" /usr/local/bin/bb
          bb --version

      - name: Install Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d  # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pin the Odin release: the default tracks master, which broke
          # core:sys/linux (Sig_Action) between dev-2026-04 and -06 and
          # turned CI red repo-wide. dev-2026-04 is the line the tree
          # builds and tests clean on. Bump deliberately, not silently.
          release: dev-2026-04

      - name: Run Fennel tests
        run: luajit test/lua/runner.lua test/lua/test_*.fnl

      - name: Build redin (REDIN_AGENT=true)
        run: |
          mkdir -p build
          ./build-dev.sh -define:REDIN_AGENT=true

      - name: Run UI tests under xvfb (includes agent suite)
        run: bash test/ui/run-all.sh --headless
